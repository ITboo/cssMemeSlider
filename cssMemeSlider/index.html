<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cssMemeSlider</title>
    <link rel="shortcut icon" href="./assets/" type="image/x-icon">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="slider">
        <div class="slider__images">
            <input type="radio" name="slide" id="img1" checked>
            <input type="radio" name="slide" id="img2">
            <input type="radio" name="slide" id="img3">
            <input type="radio" name="slide" id="img4">

            <img src="./assets/1.jpg" class="item1" alt="meme" class="slider__image">
            <img src="./assets/2.jpg" class="item2" alt="meme" class="slider__image">
            <img src="./assets/3.jpg" class="item3" alt="meme" class="slider__image">
            <img src="./assets/4.jpg" class="item4" alt="meme" class="slider__image">
        </div>
        <div class="slider__bottom">
            <div class="bottom__title">
                <span>Боги языков программирования для начинающих</span>
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="bottom__pagination">
                <label for="item1"></label>
                <label for="item2"></label>
                <label for="item3"></label>
                <label for="item4"></label>
            </div>
        </div>
    </div>
</body>

</html>
