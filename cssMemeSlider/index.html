<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cssMemeSlider</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="./assets/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="slider">
        <div class="slider__images">
            <input type="radio" name="slide" id="img1" checked>
            <input type="radio" name="slide" id="img2">
            <input type="radio" name="slide" id="img3">
            <input type="radio" name="slide" id="img4">

            <img src="./assets/1.jpg" class="item1" alt="meme">
            <img src="./assets/2.jpg" class="item2" alt="meme">
            <img src="./assets/3.jpg" class="item3" alt="meme">
            <img src="./assets/4.jpg" class="item4" alt="meme">
        </div>
        <div class="slider__bottom">
            <div class="bottom__title">
                <span class="text">Боги языков программирования для начинающих</span>
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="bottom__pagination">
                <label for="img1"><span></span></label>
                <label for="img2"><span></span></label>
                <label for="img3"><span></span></label>
                <label for="img4"><span></span></label>
            </div>
        </div>
    </div>
</body>

</html>
